<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Administrator Login</title>

    <style>

        body{

            background:#111;

            color:white;

            font-family:Arial;

            display:flex;

            justify-content:center;

            align-items:center;

            height:100vh;

            margin:0;

        }

        .login-box{

            width:400px;

            background:#222;

            padding:30px;

            border-radius:10px;

            box-shadow:0 0 20px rgba(255,255,255,.15);

        }

        h2{

            text-align:center;

            margin-bottom:25px;

        }

        input{

            width:100%;

            padding:12px;

            margin-top:10px;

            margin-bottom:20px;

            border:none;

            border-radius:5px;

            font-size:16px;

            box-sizing:border-box;

        }

        button{

            width:100%;

            padding:12px;

            background:#28a745;

            color:white;

            border:none;

            border-radius:5px;

            font-size:16px;

            cursor:pointer;

        }

        button:hover{

            background:#218838;

        }

        .error{

            color:red;

            text-align:center;

            margin-bottom:15px;

            font-weight:bold;

        }

        a{

            color:#00bfff;

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="login-box">

    <h2>Administrator Login</h2>

    {% if error %}

        <div class="error">

            {{ error }}

        </div>

    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="id"
            placeholder="Administrator ID"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">

            Login

        </button>

    </form>

    <br>

    <center>

        <a href="/">← Back Home</a>

    </center>

</div>

</body>

</html>
