<!DOCTYPE html>
<html lang="ko">

<head>
<!-- --------------------------------------------------------- -->
<!-- Close Button -->
<!-- --------------------------------------------------------- -->

<div style="margin-bottom:20px;">

    <button
        class="btn btn-danger"
        onclick="window.close();">

        ✖ CLOSE

    </button>

</div>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>ETH ↔ WDM Swap</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

    background:#111;
    color:#ffffff;

}

.container{

    max-width:650px;

}

.card{

    background:#1f1f1f;

    border:1px solid #444;

    border-radius:15px;

}

h2,
h3,
h4,
h5,
label{

    color:#ffffff;

}

.value{

    color:#00ff99;

    font-weight:bold;

}

.form-control,
.form-select{

    background:#2b2b2b !important;

    color:#ffffff !important;

    border:1px solid #666;

}

.form-control:focus,
.form-select:focus{

    background:#2b2b2b !important;

    color:#ffffff !important;

    border-color:#ffc107;

    box-shadow:none;

}

.form-select option{

    background:#2b2b2b;

    color:#ffffff;

}

::placeholder{

    color:#bbbbbb;

}

.btn-warning{

    font-weight:bold;

}

#result{

    color:#00d9ff;

    font-weight:bold;

}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h2 class="text-center text-warning mb-4">

ETH ↔ WDM Swap

</h2>

<div class="mb-3">

<label class="form-label">

Swap Direction

</label>

<select
id="direction"
class="form-select">

<option value="ETH_TO_WDM">

ETH → WDM

</option>

<option value="WDM_TO_ETH">

WDM → ETH

</option>

</select>

</div>

<div class="mb-4">

<label class="form-label">

Amount

</label>

<input

type="number"

id="amount"

class="form-control"

value="1"

step="0.00000001"

min="0"

>

</div>

<hr>

<div class="d-flex justify-content-between mb-3">

<h5>

Current ETH Price

</h5>

<h5 class="value" id="eth_price">

Loading...

</h5>

</div>

<div class="d-flex justify-content-between mb-4">

<h5>

Current WDM Price

</h5>

<h5 class="value" id="wdm_price">

Loading...

</h5>

</div>

<hr>

<h4>

Estimated Receive

</h4>

<h3 id="result">

0

</h3>

<button

class="btn btn-warning w-100 mt-4"

onclick="calculateSwap()">

Calculate Swap

</button>

</div>

</div>

<script>

let ethPrice = 0;

let wdmPrice = 0;

async function loadPrice(){

    try{

        const response = await fetch("/swap-api");

        const data = await response.json();

        ethPrice = Number(data.eth_price);

        wdmPrice = Number(data.wdm_price);

        document.getElementById("eth_price").innerHTML =
            "$ " + ethPrice.toFixed(2);

        document.getElementById("wdm_price").innerHTML =
            "$ " + wdmPrice.toFixed(8);

    }

    catch(e){

        console.log(e);

    }

}

function calculateSwap(){

    let amount =
        parseFloat(
            document.getElementById("amount").value
        );

    if(isNaN(amount) || amount<=0){

        document.getElementById("result").innerHTML="0";

        return;

    }

    let direction =
        document.getElementById("direction").value;

    let receive = 0;

    if(direction==="ETH_TO_WDM"){

        receive=(amount*ethPrice)/wdmPrice;

        document.getElementById("result").innerHTML=

            receive.toFixed(2)+" WDM";

    }

    else{

        receive=(amount*wdmPrice)/ethPrice;

        document.getElementById("result").innerHTML=

            receive.toFixed(8)+" ETH";

    }

}

document.getElementById("amount").addEventListener(

"input",

calculateSwap

);

document.getElementById("direction").addEventListener(

"change",

calculateSwap

);

loadPrice();

setInterval(function(){

    loadPrice();

    calculateSwap();

},5000);

</script>

</body>

</html>
