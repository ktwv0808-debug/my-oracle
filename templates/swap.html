<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>ETH ↔ WDM Swap</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

    background:#111;

    color:white;

}

.card{

    background:#1f1f1f;

    border-radius:15px;

}

.value{

    color:#00ff99;

    font-weight:bold;

}

.btn-swap{

    width:100%;

    font-size:18px;

}

</style>

</head>

<body>

<div class="container mt-5">

    <h2 class="text-warning text-center mb-4">

        ETH ↔ WDM Swap

    </h2>

    <div class="card p-4">

        <div class="mb-3">

            <label class="form-label">

                Swap Direction

            </label>

            <select
                id="direction"
                class="form-select">

                <option value="ETH_TO_WDM">

                    ETH → WDM

                </option>

                <option value="WDM_TO_ETH">

                    WDM → ETH

                </option>

            </select>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Amount

            </label>

            <input
                type="number"
                class="form-control"
                id="amount"
                value="1"
                min="0"
                step="0.00000001">

        </div>

        <hr>

        <h5>

            Current ETH Price

            <span
                class="value"
                id="eth_price">

                Loading...

            </span>

        </h5>

        <h5>

            Current WDM Price

            <span
                class="value"
                id="wdm_price">

                Loading...

            </span>

        </h5>

        <hr>

        <h4>

            Estimated Receive

        </h4>

        <h3
            class="text-info"
            id="result">

            0

        </h3>

        <button
            class="btn btn-warning btn-swap mt-4"
            onclick="calculateSwap()">

            Calculate Swap

        </button>

    </div>

</div>

<script>

let ethPrice = 0;

let wdmPrice = 0;

async function loadPrice(){

    const response = await fetch("/swap-api");

    const data = await response.json();

    ethPrice = data.eth_price;

    wdmPrice = data.wdm_price;

    document.getElementById("eth_price").innerHTML =
        "$ " + ethPrice.toFixed(2);

    document.getElementById("wdm_price").innerHTML =
        "$ " + wdmPrice.toFixed(8);

}

function calculateSwap(){

    let amount =
        parseFloat(
            document.getElementById("amount").value
        );

    let direction =
        document.getElementById("direction").value;

    let receive = 0;

    if(direction==="ETH_TO_WDM"){

        receive =
            (amount*ethPrice)/wdmPrice;

        document.getElementById("result").innerHTML =
            receive.toFixed(2) + " WDM";

    }

    else{

        receive =
            (amount*wdmPrice)/ethPrice;

        document.getElementById("result").innerHTML =
            receive.toFixed(8) + " ETH";

    }

}

loadPrice();

setInterval(loadPrice,5000);

</script>

</body>

</html>
