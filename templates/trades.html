<!DOCTYPE html>

<html>

<body style="padding:30px;font-family:Arial">


<h1>

Trading Records

</h1>


<table border="1" width="100%">


<tr>

<th>ID</th>

<th>Symbol</th>

<th>Action</th>

<th>Price</th>

<th>Date</th>

</tr>



{% for t in trades %}


<tr>

<td>{{t[0]}}</td>

<td>{{t[1]}}</td>

<td>{{t[2]}}</td>

<td>{{t[3]}}</td>

<td>{{t[4]}}</td>

</tr>


{% endfor %}



</table>



<br>


<button onclick="window.close()">

Close

</button>



</body>


</html>
