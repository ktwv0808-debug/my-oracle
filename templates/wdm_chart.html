<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>WDM Trading Chart</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

    background:#111;

    color:white;

    font-family:Arial;

    margin:20px;

}

.container{

    width:98%;

    margin:auto;

}

canvas{

    background:#fff;

    border-radius:10px;

    border:1px solid #aaa;

}

</style>

</head>

<body>

<h2 align="center">

📈 WDM Trading Chart

</h2>

<div class="container">

<canvas id="wdmChart"></canvas>

</div>

<script>

let chart=null;

async function loadChart(){

    const res=await fetch("/wdm-chart-data");

    const data=await res.json();

    if(chart){

        chart.destroy();

    }

    chart=new Chart(

        document.getElementById("wdmChart"),

        {

            type:"line",

            data:{

                labels:data.labels,

                datasets:[

                {

                    label:"WDM",

                    data:data.prices,

                    borderColor:"#0066ff",

                    backgroundColor:"#0066ff",

                    borderWidth:2,

                    pointRadius:0,

                    tension:0.25

                },

                {

                    label:"MA20",

                    data:data.ma20,

                    borderColor:"#ff9900",

                    backgroundColor:"#ff9900",

                    borderWidth:2,

                    pointRadius:0,

                    tension:0.25

                },

                {

                    label:"MA60",

                    data:data.ma60,

                    borderColor:"#ff0000",

                    backgroundColor:"#ff0000",

                    borderWidth:2,

                    pointRadius:0,

                    tension:0.25

                },

                {

                    label:"BUY",

                    data:data.buy,

                    showLine:false,

                    pointRadius:8,

                    pointStyle:"triangle",

                    borderColor:"green",

                    backgroundColor:"lime"

                },

                {

                    label:"SELL",

                    data:data.sell,

                    showLine:false,

                    pointRadius:8,

                    pointStyle:"rectRot",

                    borderColor:"red",

                    backgroundColor:"red"

                },

                {

                    label:"Golden",

                    data:data.golden,

                    showLine:false,

                    pointRadius:10,

                    pointStyle:"star",

                    borderColor:"gold",

                    backgroundColor:"gold"

                },

                {

                    label:"Dead",

                    data:data.dead,

                    showLine:false,

                    pointRadius:10,

                    pointStyle:"crossRot",

                    borderColor:"black",

                    backgroundColor:"black"

                }

                ]

            },

            options:{

                responsive:true,

                animation:false,

                maintainAspectRatio:false,

                interaction:{

                    mode:"index",

                    intersect:false

                },

                plugins:{

                    legend:{

                        labels:{

                            color:"white",

                            font:{

                                size:13

                            }

                        }

                    }

                },

                scales:{

                    x:{

                        display:true,

                        ticks:{

                            display:true,

                            color:"#ffffff"

                        },

                        grid:{

                            color:"#444"

                        }

                    },

                    y:{

                        display:true,

                        ticks:{

                            display:true,

                            color:"#ffffff"

                        },

                        grid:{

                            color:"#444"

                        }

                    }

                }

            }

        }

    );

}

loadChart();

setInterval(loadChart,5000);

</script>

</body>

</html>
