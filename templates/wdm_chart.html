<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>WDM Chart</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial;
}

.container{
    width:95%;
    margin:auto;
}

canvas{
    background:#222;
}

</style>

</head>

<body>

<div class="container">

<h2>WDM Trading Chart</h2>

<canvas id="chart" height="120"></canvas>

</div>

<script>

let chart = null;

async function loadChart(){

    const res = await fetch("/wdm-chart-data");

    const data = await res.json();

    if(chart != null){
        chart.destroy();
    }

    chart = new Chart(
        document.getElementById("chart"),
        {

        type:"line",

        data:{

            labels:data.labels,

            datasets:[

            //--------------------------------
            // WDM PRICE
            //--------------------------------

            {

                label:"WDM",

                data:data.prices,

                borderColor:"white",

                backgroundColor:"white",

                borderWidth:2,

                tension:0.2,

                pointRadius:0

            },

            //--------------------------------
            // MA20
            //--------------------------------

            {

                label:"MA20",

                data:data.ma20,

                borderColor:"deepskyblue",

                backgroundColor:"deepskyblue",

                borderWidth:2,

                tension:0.2,

                pointRadius:0

            },

            //--------------------------------
            // MA60
            //--------------------------------

            {

                label:"MA60",

                data:data.ma60,

                borderColor:"red",

                backgroundColor:"red",

                borderWidth:2,

                tension:0.2,

                pointRadius:0

            },

            //--------------------------------
            // BUY
            //--------------------------------

            {

                type:"scatter",

                label:"BUY",

                data:data.buy.map((v,i)=>{

                    if(v==null) return null;

                    return{

                        x:data.labels[i],

                        y:v

                    };

                }),

                pointRadius:8,

                pointStyle:"triangle",

                backgroundColor:"lime"

            },

            //--------------------------------
            // SELL
            //--------------------------------

            {

                type:"scatter",

                label:"SELL",

                data:data.sell.map((v,i)=>{

                    if(v==null) return null;

                    return{

                        x:data.labels[i],

                        y:v

                    };

                }),

                pointRadius:8,

                pointStyle:"triangle",

                rotation:180,

                backgroundColor:"red"

            },

            //--------------------------------
            // GOLDEN CROSS
            //--------------------------------

            {

                type:"scatter",

                label:"Golden Cross",

                data:data.golden.map((v,i)=>{

                    if(v==null) return null;

                    return{

                        x:data.labels[i],

                        y:v

                    };

                }),

                pointRadius:12,

                pointStyle:"star",

                backgroundColor:"yellow"

            },

            //--------------------------------
            // DEAD CROSS
            //--------------------------------

            {

                type:"scatter",

                label:"Dead Cross",

                data:data.dead.map((v,i)=>{

                    if(v==null) return null;

                    return{

                        x:data.labels[i],

                        y:v

                    };

                }),

                pointRadius:12,

                pointStyle:"star",

                backgroundColor:"purple"

            }

            ]

        },

        options:{

            responsive:true,

            interaction:{
                intersect:false,
                mode:"index"
            },

            plugins:{

                legend:{
                    labels:{
                        color:"white"
                    }
                }

            },

            scales:{

                x:{

                    ticks:{
                        color:"white"
                    },

                    grid:{
                        color:"#444"
                    }

                },

                y:{

                    ticks:{
                        color:"white"
                    },

                    grid:{
                        color:"#444"
                    }

                }

            }

        }

    });

}

loadChart();

setInterval(loadChart,5000);

</script>

</body>

</html>
