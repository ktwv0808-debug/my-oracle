<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<title>WDM Trading Chart</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{

    background:#111;

    color:white;

    font-family:Arial;

    margin:0;

    padding:20px;

}

.container{

    width:98%;

    margin:auto;

}

canvas{

    background:#ffffff;

    border-radius:10px;

    padding:10px;

}

</style>

</head>

<body>

<div class="container">

<h2 align="center">

📈 WDM Trading Chart

</h2>

<canvas id="wdmChart"></canvas>

</div>

<script>

let chart=null;

async function loadChart(){

    const response=await fetch("/wdm-chart-data");

    const data=await response.json();

    if(chart){

        chart.destroy();

    }

    chart=new Chart(

        document.getElementById("wdmChart"),

        {

            type:"line",

            data:{

                labels:data.labels,

                datasets:[

                {

                    label:"WDM",

                    data:data.prices,

                    borderColor:"blue",

                    backgroundColor:"blue",

                    borderWidth:2,

                    tension:0.2,

                    pointRadius:0

                },

                {

                    label:"MA20",

                    data:data.ma20,

                    borderColor:"orange",

                    backgroundColor:"orange",

                    borderWidth:2,

                    tension:0.2,

                    pointRadius:0

                },

                {

                    label:"MA60",

                    data:data.ma60,

                    borderColor:"red",

                    backgroundColor:"red",

                    borderWidth:2,

                    tension:0.2,

                    pointRadius:0

                },

                {

                    type:"scatter",

                    label:"BUY",

                    data:data.buy.map((v,i)=>{

                        if(v==null) return null;

                        return{

                            x:data.labels[i],

                            y:v

                        };

                    }),

                    pointRadius:8,

                    pointBackgroundColor:"lime"

                },

                {

                    type:"scatter",

                    label:"SELL",

                    data:data.sell.map((v,i)=>{

                        if(v==null) return null;

                        return{

                            x:data.labels[i],

                            y:v

                        };

                    }),

                    pointRadius:8,

                    pointBackgroundColor:"red"

                },

                {

                    type:"scatter",

                    label:"Golden Cross",

                    data:data.golden.map((v,i)=>{

                        if(v==null) return null;

                        return{

                            x:data.labels[i],

                            y:v

                        };

                    }),

                    pointRadius:10,

                    pointBackgroundColor:"gold"

                },

                {

                    type:"scatter",

                    label:"Dead Cross",

                    data:data.dead.map((v,i)=>{

                        if(v==null) return null;

                        return{

                            x:data.labels[i],

                            y:v

                        };

                    }),

                    pointRadius:10,

                    pointBackgroundColor:"black"

                }

                ]

            },

            options:{

                responsive:true,

                animation:false,

                interaction:{

                    mode:"index",

                    intersect:false

                },

                plugins:{

                    legend:{

                        labels:{

                            color:"white"

                        }

                    }

                },

                scales:{

                    x:{

                        ticks:{

                            color:"white"

                        },

                        grid:{

                            color:"#444"

                        }

                    },

                    y:{

                        ticks:{

                            color:"white"

                        },

                        grid:{

                            color:"#444"

                        }

                    }

                }

            }

        }

    );

}

loadChart();

setInterval(loadChart,5000);

</script>

</body>

</html>
