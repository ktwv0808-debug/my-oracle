<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>Save Price</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h2 class="text-warning">

Save ETH Price

</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">

Price

</label>

<input

class="form-control"

name="price"

value="{{ live_price }}"

>

</div>

<button class="btn btn-success">

Save

</button>

</form>

<br>

<div class="alert alert-info">

{{ message }}

</div>

<table class="table table-dark table-striped">

<thead>

<tr>

<th>ID</th>

<th>Price</th>

<th>Date</th>

</tr>

</thead>

<tbody>

{% for p in prices %}

<tr>

<td>{{ p.id }}</td>

<td>{{ p.price }}</td>

<td>{{ p.created_at }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
