<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Save ETH Price</title>


<script src="/static/language.js"></script>


<style>

body{

font-family:Arial, sans-serif;

background:#f5f5f5;

text-align:center;

}



.box{

width:1100px;

max-width:95%;

margin:40px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}


.language{

text-align:right;

}



select{

padding:8px;

}



h1{

text-align:center;

}



input{

width:300px;

padding:12px;

font-size:18px;

border-radius:10px;

border:1px solid #aaa;

}



button{

display:block;

margin:20px auto;

padding:12px 50px;

font-size:16px;

background:#0066cc;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}



.close{

background:#333;

}



.message{

margin:20px;

font-size:18px;

color:green;

}



table{

width:90%;

margin:30px auto;

border-collapse:collapse;

}



th{

background:#0066cc;

color:white;

padding:12px;

}



td{

padding:12px;

border:1px solid #ccc;

}



</style>


</head>



<body>



<div class="box">



<div class="language">


Language :


<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>



<option value="ko">

한국어

</option>


</select>


</div>






<h1

data-en="Save ETH Price"

data-ko="ETH 가격 저장">


Save ETH Price


</h1>







<form method="POST">


<input

type="number"

step="0.000001"

name="price"

placeholder="ETH Price">


<button

type="submit"


data-en="Save"

data-ko="저장">


Save


</button>



</form>






{% if message %}


<div class="message">


{{message}}


</div>


{% endif %}







<h2

data-en="Price Records"

data-ko="가격 저장 기록">


Price Records


</h2>





<table>



<tr>


<th>ID</th>


<th>ETH Price</th>


<th>Date</th>


</tr>





{% if prices %}



{% for p in prices %}



<tr>


<td>

{{p.id}}

</td>



<td>

{{ "%.6f"|format(p.price) }} ETH

</td>



<td>

{{p.created_at}}

</td>



</tr>



{% endfor %}





{% else %}



<tr>

<td colspan="3">

No Data

</td>

</tr>



{% endif %}




</table>







<button

class="close"

onclick="closePopup()"


data-en="Close"

data-ko="닫기">


Close


</button>





</div>



</body>


</html>
