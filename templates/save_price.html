<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Save ETH Price</title>


<style>

body{

background:#f5f7fa;

font-family:Arial;

text-align:center;

}


.box{

width:600px;

margin:50px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}


button{

padding:12px 40px;

background:#0066cc;

color:white;

border:0;

border-radius:10px;

cursor:pointer;

}


select{

padding:8px;

}

</style>


<script>


function change(){


if(lang.value=="ko"){


title.innerHTML="ETH 가격 저장";


close.innerHTML="닫기";


}

else{


title.innerHTML="Save ETH Price";


close.innerHTML="Close";


}


}


</script>


</head>


<body>



<div class="box">


<div style="text-align:right">

Language :

<select id="lang" onchange="change()">


<option value="en">

English

</option>


<option value="ko">

한국어

</option>


</select>


</div>



<h1 id="title">

Save ETH Price

</h1>



<h2>

Price Saved Successfully

</h2>



<button onclick="closeOnly()">
Close
</button>


<script>

function closeOnly(){

window.open('','_self');

window.close();

}

</script>


</button>


</div>


</body>

</html>
