<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>W-donation</title>


<style>


body{

margin:0;

background:#f3f5f8;

font-family:"Segoe UI",Arial;

}



.container{

width:950px;

margin:40px auto;

background:white;

padding:50px;

border-radius:25px;

box-shadow:0 8px 30px #bbb;

text-align:center;

}



.language{

text-align:right;

margin-bottom:20px;

}



select{

padding:8px;

cursor:pointer;

}



.logo{

width:180px;

margin-bottom:20px;

}



h1{

font-size:45px;

}



.subtitle{

font-size:25px;

color:#555;

}



.section{

margin-top:40px;

}



.table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}



.table th{

background:#0066cc;

color:white;

padding:12px;

}



.table td{

border:1px solid #ddd;

padding:12px;

}



.button{

display:inline-block;

margin:15px;

padding:15px 35px;

background:#0066cc;

color:white;

border-radius:12px;

cursor:pointer;

font-size:18px;

}



.button:hover{

background:#003b80;

}



</style>



<script>


let langData={


en:{


title:"W-donation",

subtitle:"Blockchain With Social Responsibility",

intro1:"Creating technology that creates social impact.",

intro2:"10% of quarterly net profits generated by the W-donation ecosystem will be donated to World Vision.",

intro3:"Donation records and transaction details will be publicly disclosed.",


mission:"Our Mission",

missionText:

"W-donation believes that blockchain technology can create positive change beyond digital assets. Through transparent operation and community participation, we aim to build a sustainable ecosystem where technology supports social responsibility.",



report:"Quarterly Donation Report",

quarter:"Quarter",

profit:"Net Profit",

donation:"Donation (10%)",

proof:"Transaction Proof",


system:"Automatic Trading System",

paper:"Whitepaper",

poem:"Toward Victory"


},



ko:{


title:"W-donation",

subtitle:"사회적 책임을 위한 블록체인",

intro1:"사회적 가치를 만드는 기술을 만듭니다.",

intro2:"W-donation 생태계에서 발생하는 분기 순이익의 10%는 월드비전에 기부됩니다.",

intro3:"기부 기록과 거래 내역은 투명하게 공개됩니다.",


mission:"우리의 목표",

missionText:

"W-donation은 블록체인 기술이 디지털 자산을 넘어 긍정적인 변화를 만들 수 있다고 믿습니다. 투명한 운영과 커뮤니티 참여를 통해 기술과 사회적 책임이 함께하는 지속 가능한 생태계를 구축합니다.",


report:"분기별 기부 보고서",

quarter:"분기",

profit:"순이익",

donation:"기부금(10%)",

proof:"거래 증명",


system:"자동매매 시스템",

paper:"백서",

poem:"승리를 향하여"


}



};





function changeLanguage(){



let lang=document.getElementById("lang").value;


let d=langData[lang];



document.getElementById("title").innerHTML=d.title;


document.getElementById("subtitle").innerHTML=d.subtitle;


document.getElementById("intro1").innerHTML=d.intro1;


document.getElementById("intro2").innerHTML=d.intro2;


document.getElementById("intro3").innerHTML=d.intro3;


document.getElementById("mission").innerHTML=d.mission;


document.getElementById("missionText").innerHTML=d.missionText;


document.getElementById("report").innerHTML=d.report;


document.getElementById("quarter").innerHTML=d.quarter;


document.getElementById("profit").innerHTML=d.profit;


document.getElementById("donation").innerHTML=d.donation;


document.getElementById("proof").innerHTML=d.proof;


document.getElementById("system").innerHTML=d.system;


document.getElementById("paper").innerHTML=d.paper;


document.getElementById("poem").innerHTML=d.poem;



}



</script>


</head>


<body>


<div class="container">



<div class="language">


Language :


<select id="lang"
onchange="changeLanguage()">



<option value="en" selected>

English

</option>


<option value="ko">

한국어

</option>


</select>


</div>
