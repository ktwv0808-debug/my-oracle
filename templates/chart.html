<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>ETH Live Chart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-dark text-light">

<div class="container mt-4">

<h2 class="text-warning text-center">

ETH Live Price Chart

</h2>

<h3 id="signal" class="text-center mb-3">
⚪ HOLD
</h3>

<canvas id="chart" height="120"></canvas>

<br><br>

<a href="/price" class="btn btn-primary">
← Back
</a>

<a href="/history" class="btn btn-secondary">
History
</a>

<a href="/trade-check" class="btn btn-warning">
Signal
</a>

<a href="/trades" class="btn btn-danger">
Trades
</a>

</div>

<script>

const ctx = document.getElementById("chart");

const chart = new Chart(ctx,{

    type:"line",

    data:{

        labels:[],

        datasets:[

        {

            label:"ETH",

            data:[],

            borderColor:"yellow",

            backgroundColor:"transparent",

            borderWidth:3,

            pointRadius:1,

            tension:0.3,

            fill:false

        },

        {

            label:"BUY",

            data:[],

            showLine:false,

            pointRadius:8,

            pointHoverRadius:8,

            pointStyle:"triangle",

            rotation:0,

            backgroundColor:"lime",

            borderColor:"lime"

        },

        {

            label:"SELL",

            data:[],

            showLine:false,

            pointRadius:8,

            pointHoverRadius:8,

            pointStyle:"triangle",

            rotation:180,

            backgroundColor:"red",

            borderColor:"red"

        }

        ]

    },

    options:{

        responsive:true,

        animation:false,

        plugins:{

            legend:{

                labels:{
                    color:"white"
                }
            }

        },

        scales:{

            x:{

                ticks:{
                    color:"white"
                }

            },

            y:{

                ticks:{
                    color:"white"
                }

            }

        }

    }

});


function loadChart(){

    fetch("/chart-data")

    .then(r=>r.json())

    .then(data=>{

        chart.data.labels = data.labels;

        chart.data.datasets[0].data = data.prices;

        chart.data.datasets[1].data = data.buy;

        chart.data.datasets[2].data = data.sell;

        chart.update();

        if(data.signal=="BUY"){

            document.getElementById("signal").innerHTML =
            "🟢 BUY SIGNAL";

            document.getElementById("signal").style.color =
            "lime";

        }

        else if(data.signal=="SELL"){

            document.getElementById("signal").innerHTML =
            "🔴 SELL SIGNAL";

            document.getElementById("signal").style.color =
            "red";

        }

        else{

            document.getElementById("signal").innerHTML =
            "⚪ HOLD";

            document.getElementById("signal").style.color =
            "white";

        }

    });

}

loadChart();

setInterval(loadChart,5000);

</script>

</body>
</html>
