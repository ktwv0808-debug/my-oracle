<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Price History</title>

<script src="/static/language.js"></script>


<style>

body{

font-family:Arial;

background:#f5f5f5;

text-align:center;

}


.box{

width:650px;

margin:50px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}


table{

margin:auto;

border-collapse:collapse;

}


td,th{

padding:10px;

border:1px solid #ccc;

}


button{

margin-top:20px;

padding:12px 40px;

background:#333;

color:white;

border:0;

border-radius:10px;

cursor:pointer;

}


</style>


</head>


<body>


<div class="box">



<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>


<option value="ko">

한국어

</option>



</select>





<h1

data-en="Price History"

data-ko="가격 기록">

Price History

</h1>




<table>


<tr>

<th>

ETH

</th>


<th>

Date

</th>

</tr>



{% for h in history %}

<tr>

<td>

{{h[0]}}

</td>


<td>

{{h[1]}}

</td>


</tr>


{% endfor %}



</table>





<button onclick="closePopup()">
Close
</button>


<script>

function closePopup(){

    self.close();

}

</script>



</div>


</body>


</html>
