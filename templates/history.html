<!DOCTYPE html>

<html>

<body style="padding:30px;font-family:Arial">


<h1>

Price History

</h1>


<table border="1" width="100%">


<tr>

<th>ID</th>

{% endfor %}



</table>

Close

</button>


</body>


</html>
