<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">


<title>Price History</title>


<script src="/static/language.js"></script>



<style>


body{

font-family:Arial, sans-serif;

background:#f5f5f5;

text-align:center;

}



.box{

width:900px;

margin:40px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}



.language{

text-align:right;

}



select{

padding:8px;

}



h1{

text-align:center;

}




table{

width:90%;

margin:30px auto;

border-collapse:collapse;

}



th{

background:#0066cc;

color:white;

padding:12px;

}



td{

padding:12px;

border:1px solid #ccc;

}




button{


display:block;

margin:30px auto;


padding:12px 50px;


background:#333;


color:white;


border:none;


border-radius:10px;


cursor:pointer;


font-size:16px;


}



</style>


</head>



<body>


<div class="box">





<div class="language">


Language :


<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>



<option value="ko">

한국어

</option>



</select>


</div>






<h1

data-en="Price History"

data-ko="가격 기록">


Price History


</h1>






<table>


<tr>


<th>ID</th>


<th>ETH Price</th>


<th>Date</th>


</tr>






{% if prices %}



{% for p in prices %}



<tr>


<td>

{{p.id}}

</td>



<td>

{{ "%.6f"|format(p.price) }} ETH

</td>



<td>

{{p.created_at}}

</td>



</tr>




{% endfor %}





{% else %}



<tr>


<td colspan="3">

No Data

</td>


</tr>



{% endif %}





</table>







<button

onclick="closePopup()"


data-en="Close"

data-ko="닫기">


Close


</button>






</div>


</body>


</html>
