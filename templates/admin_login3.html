<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <title>Content Admin Login</title>

    <style>

        body{

            font-family:Arial;

            width:400px;

            margin:60px auto;

        }

        input{

            width:100%;

            padding:10px;

            margin:8px 0;

        }

        button{

            width:100%;

            padding:10px;

        }

        .error{

            color:red;

        }

    </style>

</head>

<body>

<h2>Content Admin Login</h2>

{% if error %}

<p class="error">

{{ error }}

</p>

{% endif %}

<form method="post">

    <input
        type="text"
        name="id"
        placeholder="ID"
        required
    >

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <button type="submit">

        Login

    </button>

</form>

</body>

</html>
