<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Announcement CMS</title>

<style>

body{

    background:#111;

    color:white;

    font-family:Arial;

    margin:0;

}

.container{

    width:90%;

    margin:auto;

    margin-top:30px;

}

h2{

    text-align:center;

}

input,textarea{

    width:100%;

    padding:10px;

    margin-top:8px;

    margin-bottom:15px;

    background:#222;

    color:white;

    border:1px solid #555;

}

button{

    padding:10px 25px;

    background:#00bfff;

    color:white;

    border:none;

    cursor:pointer;

}

button:hover{

    background:#0099cc;

}

table{

    width:100%;

    border-collapse:collapse;

    margin-top:40px;

}

th{

    background:#333;

    padding:10px;

}

td{

    border:1px solid #444;

    padding:10px;

}

tr:hover{

    background:#222;

}

.action{

    text-align:center;

}

a{

    color:cyan;

    text-decoration:none;

}

a:hover{

    color:yellow;

}

.logout{

    float:right;

    margin-bottom:20px;

}

</style>

</head>

<body>

<div class="container">

<h2>

📢 Announcement CMS

</h2>

<div class="logout">

<a href="/admin2/logout2">

Logout

</a>

</div>

<form method="POST">

{% if edit_row %}

<input
type="hidden"
name="action"
value="edit"
>

<input
type="hidden"
name="id"
value="{{ edit_row.id }}"
>

<h3>

Edit Announcement

</h3>

Title

<input
type="text"
name="title"
value="{{ edit_row.title }}"
required
>

Content

<textarea
name="content"
rows="8"
required
>{{ edit_row.content }}</textarea>

<button type="submit">

Update

</button>

<a href="/admin2/announcement">

Cancel

</a>

{% else %}

<input
type="hidden"
name="action"
value="add"
>

<h3>

Add Announcement

</h3>

Title

<input
type="text"
name="title"
required
>

Content

<textarea
name="content"
rows="8"
required
></textarea>

<button type="submit">

Save

</button>

{% endif %}

</form>
<hr>

<h3>

Announcement List

</h3>

<table>

<tr>

<th width="80">

ID

</th>

<th>

Title

</th>

<th width="200">

Date

</th>

<th width="180">

Action

</th>

</tr>

{% for row in rows %}

<tr>

<td align="center">

{{ row.id }}

</td>

<td>

    <a href="/announcement/{{ row.id }}" target="_blank">

        {{ row.title }}

    </a>

</td>

<td align="center">

{{ row.created_at }}

</td>

<td class="action">

    <a href="/admin2/announcement?edit={{ row.id }}">
        Edit
    </a>

    &nbsp;&nbsp;

    <a href="/announcement/delete/{{ row.id }}">
        Delete
    </a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
