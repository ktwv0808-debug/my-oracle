<!DOCTYPE html>
<html>

<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">
<!-- --------------------------------------------------------- -->
<!-- Close Button -->
<!-- --------------------------------------------------------- -->

<div style="margin-bottom:20px;">

    <button
        class="btn btn-danger"
        onclick="window.close();">

        ✖ CLOSE

    </button>

</div>
<div class="container mt-5">

<h2>Auto Trading Signal</h2>

<table class="table table-dark">

<tr>
<th>RSI</th>
<td>{{ rsi }}</td>
</tr>
<tr>
    <td>MA20</td>
    <td>{{ "%.2f"|format(ma20) if ma20 else "-" }}</td>
</tr>

<tr>
    <td>MA60</td>
    <td>{{ "%.2f"|format(ma60) if ma60 else "-" }}</td>
</tr>
<tr>
<th>Signal</th>

<td>

{% if signal=="BUY" %}
<span class="text-success fw-bold">🟢 BUY</span>

{% elif signal=="SELL" %}
<span class="text-danger fw-bold">🔴 SELL</span>

{% else %}
<span class="text-warning">{{ signal }}</span>

{% endif %}

</td>

</tr>

</table>

</div>

</body>

</html>
