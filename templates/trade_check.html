<!DOCTYPE html>

<html>

<head>

<title>Auto Trading Signal</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<h2 class="text-center mb-4">

Auto Trading Signal

</h2>

<div class="card bg-secondary">

<div class="card-body">

<h3>

Current Signal

</h3>

<h1 class="text-warning">

{{ signal }}

</h1>

<hr>

<p>

Current Price :

<strong>

{{ current }}

</strong>

</p>

<p>

Previous Price :

<strong>

{{ previous }}

</strong>

</p>

<p>

Difference :

<strong>

{{ change }}

</strong>

</p>

</div>

</div>

</div>

</body>

</html>
