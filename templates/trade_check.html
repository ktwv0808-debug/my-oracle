<!DOCTYPE html>
<html>


<head>

<meta charset="UTF-8">

<title>Auto Trading Signal</title>


<script src="/static/language.js"></script>


<style>


body{

font-family:Arial;

background:#f5f5f5;

text-align:center;

}



.box{

width:600px;

margin:50px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}


button{

padding:12px 40px;

background:#333;

color:white;

border:0;

border-radius:10px;

cursor:pointer;

}


</style>


</head>



<body>


<div class="box">



<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>


<option value="ko">

한국어

</option>


</select>




<h1 data-lang="signal">

Auto Trading Signal

</h1>




<h2>

{{signal}}

</h2>





<button data-lang="close"

onclick="window.close()">

Close

</button>



</div>


</body>


</html>
