<!DOCTYPE html>
<html lang="en">


<head>


<meta charset="UTF-8">


<title>Auto Trading Signal</title>


<script src="/static/language.js"></script>


<style>


body{

font-family:Arial, sans-serif;

background:#f5f5f5;

text-align:center;

}



.box{

width:900px;

margin:40px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}



.language{

text-align:right;

}



select{

padding:8px;

}



h1{

text-align:center;

}



.signal{


font-size:28px;

margin:30px;

color:#0066cc;

}




table{

width:90%;

margin:30px auto;

border-collapse:collapse;

}



th{

background:#0066cc;

color:white;

padding:12px;

}



td{

padding:12px;

border:1px solid #ccc;

}



button{

display:block;

margin:30px auto;

padding:12px 50px;

background:#333;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

}



</style>


</head>



<body>


<div class="box">



<div class="language">


Language :


<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>


<option value="ko">

한국어

</option>


</select>


</div>






<h1

data-en="Auto Trading Signal"

data-ko="자동 거래 신호">


Auto Trading Signal


</h1>






<div class="signal">


{{signal}}


</div>







<table>


<tr>


<th>ID</th>

<th>Signal</th>

<th>ETH Price</th>

<th>Date</th>


</tr>





{% if records %}



{% for r in records %}



<tr>


<td>

{{r.id}}

</td>



<td>

{{r.signal}}

</td>



<td>

{{ "%.6f"|format(r.price) }} ETH

</td>



<td>

{{r.created_at}}

</td>



</tr>




{% endfor %}



{% else %}


<tr>

<td colspan="4">

No Data

</td>

</tr>


{% endif %}




</table>







<button

onclick="closePopup()"


data-en="Close"

data-ko="닫기">


Close


</button>






</div>


</body>


</html>
