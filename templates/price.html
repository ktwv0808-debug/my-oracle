<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>ETH Price</title>

 <a href="/chart" class="btn btn-success">
📈 Live Chart
</a> 
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="text-center text-warning">

ETH Live Price

</h1>

<div class="card bg-secondary mt-4">

<div class="card-body">

<h2>

{% if live_price %}

{{ "%.2f"|format(live_price) }} USDT

{% else %}

Loading...

{% endif %}

</h2>

</div>

</div>

<hr>

<table class="table table-dark table-striped">

<thead>

<tr>

<th>ID</th>

<th>Price</th>

<th>Date</th>

</tr>

</thead>

<tbody>

{% for p in prices %}

<tr>

<td>{{ p.id }}</td>

<td>{{ p.price }}</td>

<td>{{ p.created_at }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>

</html>
