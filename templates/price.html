<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>ETH Price</title>


<script src="/static/language.js"></script>


<style>

body{

font-family:Arial, sans-serif;

background:#f5f5f5;

text-align:center;

}



.box{

width:700px;

margin:40px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}



.language{

text-align:right;

}



select{

padding:8px;

}



h1{

text-align:center;

}



.price-box{

font-size:25px;

margin:30px;

}



table{

width:90%;

margin:30px auto;

border-collapse:collapse;

}



th{

background:#0066cc;

color:white;

padding:12px;

}



td{

padding:12px;

border:1px solid #ccc;

}



button{


display:block;

margin:30px auto 0;


padding:12px 50px;


background:#333;


color:white;


border:none;


border-radius:10px;


cursor:pointer;


font-size:16px;

}


</style>


</head>



<body>


<div class="box">



<div class="language">


Language :


<select id="language" onchange="changeLanguage()">



<option value="en">

English

</option>



<option value="ko">

한국어

</option>



</select>


</div>





<h1

data-en="ETH Price"

data-ko="ETH 가격">


ETH Price


</h1>





<div class="price-box">


<h2

data-en="Current ETH Price"

data-ko="현재 ETH 가격">


Current ETH Price


</h2>



{% if price %}


<h1>

{{ "%.2f"|format(price.price) }} ETH

</h1>


{% else %}


<h1>

0 ETH

</h1>


{% endif %}



</div>






<table>



<tr>


<th>

ID

</th>


<th>

ETH Price

</th>


<th>

Created Date

</th>


</tr>





{% if price %}


<tr>


<td>

{{ price.id }}

</td>



<td>

{{ "%.6f"|format(price.price) }} ETH

</td>



<td>

{{ price.created_at }}

</td>



</tr>



{% else %}



<tr>


<td colspan="3">

No Data

</td>


</tr>



{% endif %}





</table>






<button

onclick="closePopup()"

data-en="Close"

data-ko="닫기">


Close


</button>





</div>



</body>


</html>
