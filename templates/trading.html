<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Automatic Trading System</title>


<script src="/static/language.js"></script>


<style>

body{

font-family:Arial;

background:#f5f5f5;

text-align:center;

}



.box{

width:700px;

margin:50px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}



button{

display:block;

width:350px;

margin:15px auto;

padding:15px;

font-size:18px;

background:#0066cc;

color:white;

border:none;

border-radius:15px;

cursor:pointer;

}



button:hover{

background:#003b80;

}



.close{

background:#333;

}



select{

padding:8px;

cursor:pointer;

}


</style>



<script>


function popup(url){


window.open(

url,

"popup",

"width=700,height=600"

);


}



</script>


</head>



<body>



<div class="box">


<div style="text-align:right">


Language :


<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>



<option value="ko">

한국어

</option>



</select>


</div>





<h1>

Automatic Trading System

</h1>





<button

onclick="popup('/price')">

ETH Price

</button>





<button

data-lang="save"

onclick="popup('/save-price')">

Save ETH Price

</button>






<button

data-lang="history"

onclick="popup('/history')">

Price History

</button>







<button

data-lang="signal"

onclick="popup('/trade-check')">

Auto Trading Signal

</button>






<button

data-lang="trades"

onclick="popup('/trades')">

Trading Records

</button>







<button

class="close"

data-lang="close"

onclick="window.close()">

Close

</button>





</div>



</body>


</html>
