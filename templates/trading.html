<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>

body{

font-family:"Segoe UI",Arial,sans-serif;

background:#f4f6f8;

margin:0;

padding:40px;

}


.container{

width:700px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,0.15);

}


h1{

text-align:center;

font-size:36px;

}


.menu{


margin-top:30px;


}



.item{


display:block;

background:#0066cc;

color:white;

padding:15px;

margin:15px 0;

border-radius:10px;

text-align:center;

cursor:pointer;

font-size:18px;


}



.item:hover{


background:#003f88;


}




.close{


display:block;

margin:35px auto 0;

background:#555;

color:white;

border:none;

padding:12px 35px;

border-radius:10px;

cursor:pointer;

font-size:16px;


}


.close:hover{

background:#222;

}


</style>



<script>


function openApi(url){


window.open(

url,

"api",

"width=600,height=400,scrollbars=yes"

);


}



function closeWindow(){


window.close();


}


</script>



</head>


<body>



<div class="container">


<h1>

Automatic Trading System

</h1>




<div class="menu">



<div class="item"
onclick="openApi('/price')">

ETH Price

</div>



<div class="item"
onclick="openApi('/save-price')">

Save ETH Price

</div>




<div class="item"
onclick="openApi('/history')">

Price History

</div>



<div class="item"
onclick="openApi('/trade-check')">

Auto Trading Signal

</div>



<div class="item"
onclick="openApi('/trades')">

Trading Records

</div>



</div>




<button class="close"
onclick="closeWindow()">

Close Window

</button>



</div>



</body>

</html>
