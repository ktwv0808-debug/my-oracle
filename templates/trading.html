<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>

body{

font-family:Arial;

background:#f4f6f8;

padding:40px;

}


.box{

width:650px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

}



.item{

background:#0066cc;

color:white;

padding:15px;

margin:15px;

border-radius:10px;

text-align:center;

cursor:pointer;

}



.item:hover{

background:#003f88;

}



.close{

margin-top:30px;

padding:12px 30px;

cursor:pointer;

}


</style>



<script>


function openPopup(url){


window.open(

url,

"popup",

"width=700,height=500"

);


}



</script>


</head>


<body>



<div class="box">


<h1>

Automatic Trading System

</h1>



<div class="item"
onclick="openPopup('/price-page')">

ETH Price

</div>



<div class="item"
onclick="openPopup('/save-price-page')">

Save ETH Price

</div>



<div class="item"
onclick="openPopup('/history-page')">

Price History

</div>



<div class="item"
onclick="openPopup('/trade-check-page')">

Auto Trading Signal

</div>



<div class="item"
onclick="openPopup('/trades-page')">

Trading Records

</div>



<button class="close"
onclick="window.close()">

Close

</button>



</div>


</body>

</html>
