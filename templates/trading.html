<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>

body{

font-family:Arial;

background:#f3f5f7;

padding:40px;

}


.box{

background:white;

width:650px;

margin:auto;

padding:40px;

border-radius:20px;

box-shadow:0 5px 20px #aaa;

}


.language{

text-align:right;

}


.item{

background:#0066cc;

color:white;

padding:15px;

margin:15px;

border-radius:10px;

text-align:center;

cursor:pointer;

}



.item:hover{

background:#003d80;

}


button{

padding:12px 30px;

cursor:pointer;

}


</style>


<script>


function popup(url){

window.open(

url,

"popup",

"width=750,height=550"

);

}



function lang(){


let x=document
.getElementById("lang")
.value;



if(x=="ko"){


document.getElementById("title").innerHTML="자동매매 시스템";

document.getElementById("eth").innerHTML="ETH 가격";

document.getElementById("save").innerHTML="ETH 가격 저장";

document.getElementById("history").innerHTML="가격 기록";

document.getElementById("signal").innerHTML="자동매매 신호";

document.getElementById("records").innerHTML="거래 기록";


}

else{


location.reload();


}


}


</script>


</head>


<body>


<div class="box">



<div class="language">

Language :

<select id="lang" onchange="lang()">

<option selected>

English

</option>


<option value="ko">

한국어

</option>


</select>


</div>



<h1 id="title">

Automatic Trading System

</h1>



<div class="item"
onclick="popup('/price-page')"
id="eth">

ETH Price

</div>



<div class="item"
onclick="popup('/save-price-page')"
id="save">

Save ETH Price

</div>



<div class="item"
onclick="popup('/history-page')"
id="history">

Price History

</div>



<div class="item"
onclick="popup('/trade-check-page')"
id="signal">

Auto Trading Signal

</div>



<div class="item"
onclick="popup('/trades-page')"
id="records">

Trading Records

</div>




<button onclick="window.close()">

Close

</button>


</div>


</body>

</html>
