<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>


body{


margin:0;

padding:40px;

background:#f2f4f7;

font-family:"Segoe UI",Arial,sans-serif;


}



.container{


width:700px;

margin:auto;

background:white;

padding:45px;

border-radius:20px;

box-shadow:0 5px 25px rgba(0,0,0,0.15);


}





h1{


text-align:center;

font-size:36px;

color:#222;

margin-bottom:35px;


}





.menu{


margin-top:20px;


}





.item{


display:block;

background:#0066cc;

color:white;

padding:16px;

margin:15px 0;

border-radius:12px;

text-align:center;

font-size:19px;

cursor:pointer;

transition:0.3s;


}




.item:hover{


background:#003f88;

transform:scale(1.03);


}






.close{


display:block;

margin:35px auto 0;

background:#555;

color:white;

border:none;

padding:12px 35px;

border-radius:10px;

font-size:16px;

cursor:pointer;


}





.close:hover{


background:#222;


}



</style>



<script>


function openPopup(url){


window.open(

url,

"popup",

"width=700,height=500,scrollbars=yes"

);


}





function closePopup(){


window.close();


}



</script>



</head>



<body>



<div class="container">



<h1>

Automatic Trading System

</h1>




<div class="menu">



<div class="item"

onclick="openPopup('/price-page')">

ETH Price

</div>





<div class="item"

onclick="openPopup('/save-price-page')">

Save ETH Price

</div>





<div class="item"

onclick="openPopup('/history-page')">

Price History

</div>





<div class="item"

onclick="openPopup('/trade-check-page')">

Auto Trading Signal

</div>





<div class="item"

onclick="openPopup('/trades-page')">

Trading Records

</div>





</div>






<button class="close"

onclick="closePopup()">

Close Window

</button>



</div>



</body>


</html>
