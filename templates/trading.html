<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Automatic Trading System</title>


<style>

body{
    background:#f4f7fb;
    font-family:Arial;
    text-align:center;
}


.container{

    width:700px;
    margin:40px auto;
    background:white;
    padding:40px;
    border-radius:20px;
}


.button{

    width:350px;
    margin:15px auto;
    padding:15px;

    background:#0066cc;
    color:white;

    border-radius:15px;

    cursor:pointer;

    font-size:18px;

}


.button:hover{

    background:#003b80;

}


.close{

    background:#333;

}



</style>



<script>


const languageData = {


English:{


title:"Automatic Trading System",

price:"ETH Price",

save:"Save ETH Price",

history:"Price History",

signal:"Auto Trading Signal",

trades:"Trading Records",

close:"Close"


},




한국어:{


title:"자동매매 시스템",

price:"ETH 가격",

save:"ETH 가격 저장",

history:"가격 기록",

signal:"자동 거래 신호",

trades:"거래 기록",

close:"닫기"


}


};






function translate(){



let lang = document.getElementById("lang").value;



document.getElementById("title").innerText =
languageData[lang].title;



document.getElementById("price").innerText =
languageData[lang].price;



document.getElementById("save").innerText =
languageData[lang].save;



document.getElementById("history").innerText =
languageData[lang].history;



document.getElementById("signal").innerText =
languageData[lang].signal;



document.getElementById("trades").innerText =
languageData[lang].trades;



document.getElementById("close").innerText =
languageData[lang].close;



}






function openPopup(url){


window.open(

url,

"popup",

"width=750,height=600"

);


}



</script>


</head>


<body>


<div class="container">


<div style="text-align:right">


Language :


<select id="lang" onchange="translate()">



<option>

English

</option>


<option>

한국어

</option>



</select>


</div>





<h1 id="title">

Automatic Trading System

</h1>





<div class="button"

id="price"

onclick="openPopup('/price')">


ETH Price

</div>





<div class="button"

id="save"

onclick="openPopup('/save-price')">


Save ETH Price

</div>






<div class="button"

id="history"

onclick="openPopup('/history')">


Price History

</div>






<div class="button"

id="signal"

onclick="openPopup('/trade-check')">


Auto Trading Signal

</div>






<div class="button"

id="trades"

onclick="openPopup('/trades')">


Trading Records

</div>






<div class="button close"

id="close"

onclick="window.close()">


Close

</div>



</div>


</body>


</html>
