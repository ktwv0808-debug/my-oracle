<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>


body{

font-family:"Segoe UI", Arial, sans-serif;

background:#f4f6f8;

margin:0;

padding:40px;

}



.container{

width:700px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,0.15);

}



h1{

text-align:center;

font-size:36px;

margin-bottom:30px;

}



.item{


display:block;

background:#0066cc;

color:white;

padding:16px;

margin:15px 0;

border-radius:10px;

text-align:center;

font-size:18px;

text-decoration:none;

cursor:pointer;


}



.item:hover{


background:#003f88;


}



</style>



<script>


function popup(url){


window.open(

url,

"api_popup",

"width=600,height=400,scrollbars=yes"

);


}



</script>



</head>



<body>



<div class="container">


<h1>

Automatic Trading System

</h1>



<a class="item" onclick="popup('/price')">

ETH Price

</a>



<a class="item" onclick="popup('/save-price')">

Save ETH Price
</a>



<a class="item" onclick="popup('/history')">

Price History

</a>



<a class="item" onclick="popup('/trade-check')">

Auto Trading Signal

</a>



<a class="item" onclick="popup('/trades')">

Trading Records

</a>



</div>



</body>


</html>
