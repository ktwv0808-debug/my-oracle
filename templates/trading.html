<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Automatic Trading System</title>


<style>


body{

margin:0;

background:#f2f5f9;

font-family:Arial;

}


.box{

width:800px;

margin:40px auto;

background:white;

padding:40px;

border-radius:20px;

text-align:center;

box-shadow:0 0 25px #aaa;

}


button{


width:350px;

padding:15px;

margin:10px;


background:#0066cc;

color:white;


border:0;


border-radius:12px;


font-size:18px;


cursor:pointer;


}


button:hover{

background:#003b80;

}



.close{

background:#333;

}



</style>



<script>



function openPopup(url){



window.open(

url,

"popup",

"width=700,height=500,left=400,top=200"

);



}



</script>


</head>


<body>



<div class="box">



<h1>

Automatic Trading System

</h1>



<button onclick="openPopup('/price')">

ETH Price

</button>



<br>



<button onclick="openPopup('/save-price')">

Save ETH Price

</button>



<br>



<button onclick="openPopup('/history')">

Price History

</button>



<br>



<button onclick="openPopup('/trade-check')">

Auto Trading Signal

</button>



<br>



<button onclick="openPopup('/trades')">

Trading Records

</button>



<br><br>



<button class="close"
onclick="window.close()">

Close

</button>



</div>



</body>

</html>
