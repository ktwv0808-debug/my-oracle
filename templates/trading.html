<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>


body{

font-family:Arial;

background:#f5f5f5;

text-align:center;

}



.box{


width:700px;

margin:50px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;


}



button{


display:block;


width:350px;


margin:15px auto;


padding:15px;


font-size:18px;


background:#0066cc;


color:white;


border:none;


border-radius:15px;


cursor:pointer;


}



button:hover{


background:#003b80;


}



.close{


background:#333;


}



select{


padding:8px;


cursor:pointer;


}


</style>



<script>


const languageData = {



en:{


title:"Automatic Trading System",

price:"ETH Price",

save:"Save ETH Price",

history:"Price History",

signal:"Auto Trading Signal",

trades:"Trading Records",

close:"Close"


},




ko:{


title:"자동매매 시스템",

price:"ETH 가격",

save:"ETH 가격 저장",

history:"가격 기록",

signal:"자동 거래 신호",

trades:"거래 기록",

close:"닫기"


}


};






function changeLanguage(){



let lang =

document.getElementById("language").value;



document.getElementById("title").innerText =

languageData[lang].title;



document.getElementById("priceBtn").innerText =

languageData[lang].price;



document.getElementById("saveBtn").innerText =

languageData[lang].save;



document.getElementById("historyBtn").innerText =

languageData[lang].history;



document.getElementById("signalBtn").innerText =

languageData[lang].signal;



document.getElementById("tradesBtn").innerText =

languageData[lang].trades;



document.getElementById("closeBtn").innerText =

languageData[lang].close;



}





function openPopup(url){


window.open(

url,

"popup",

"width=700,height=600"

);


}





</script>



</head>



<body>



<div class="box">



<div style="text-align:right">


Language :


<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>



<option value="ko">

한국어

</option>



</select>


</div>





<h1 id="title">

Automatic Trading System

</h1>





<button id="priceBtn"

onclick="openPopup('/price')">

ETH Price

</button>





<button id="saveBtn"

onclick="openPopup('/save-price')">

Save ETH Price

</button>






<button id="historyBtn"

onclick="openPopup('/history')">

Price History

</button>






<button id="signalBtn"

onclick="openPopup('/trade-check')">

Auto Trading Signal

</button>






<button id="tradesBtn"

onclick="openPopup('/trades')">

Trading Records

</button>






<button id="closeBtn"

class="close"

onclick="window.close()">

Close

</button>






</div>



</body>


</html>
