<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>


body{

font-family:"Segoe UI",Arial,sans-serif;

background:#f4f6f8;

padding:40px;

}



.container{

width:700px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 5px 20px rgba(0,0,0,0.15);

}



h1{

text-align:center;

}



.item{

display:block;

background:#0066cc;

color:white;

padding:15px;

margin:15px;

border-radius:10px;

text-align:center;

cursor:pointer;

}



.item:hover{

background:#003f88;

}



.close{

display:block;

margin:30px auto 0;

background:#555;

color:white;

padding:12px 30px;

border-radius:10px;

border:none;

cursor:pointer;

font-size:16px;

}


.close:hover{

background:#222;

}


</style>



<script>


function popup(url){


window.open(

url,

"api_popup",

"width=600,height=400,scrollbars=yes"

);


}


function closePopup(){

window.close();

}


</script>



</head>


<body>


<div class="container">


<h1>

Automatic Trading System

</h1>



<div class="item" onclick="popup('/price')">

ETH Price

</div>



<div class="item" onclick="popup('/save-price')">

Save ETH Price

</div>



<div class="item" onclick="popup('/history')">

Price History

</div>



<div class="item" onclick="popup('/trade-check')">

Auto Trading Signal

</div>



<div class="item" onclick="popup('/trades')">

Trading Records

</div>




<button class="close" onclick="closePopup()">

Close Window

</button>



</div>


</body>


</html>
