<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Automatic Trading System</title>


<style>


body{

margin:0;

background:#f1f4f8;

font-family:"Segoe UI",Arial,sans-serif;

}


.container{


width:800px;


margin:40px auto;


background:white;


padding:40px;


border-radius:25px;


box-shadow:0 5px 25px #aaa;


text-align:center;


}



.language{


text-align:right;


}



select{


padding:8px;


cursor:pointer;


}




h1{


font-size:36px;


color:#003b80;


}



.card{


margin-top:30px;


}



.btn{


display:block;


width:400px;


margin:15px auto;


padding:15px;


background:#0066cc;


color:white;


border-radius:15px;


font-size:18px;


cursor:pointer;


}



.btn:hover{


background:#003b80;


}



.close{


background:#333;


}



.close:hover{


background:#000;


}



</style>





<script>



const lang = {


en:{


title:"Automatic Trading System",


price:"ETH Price",


save:"Save ETH Price",


history:"Price History",


signal:"Auto Trading Signal",


trades:"Trading Records",


close:"Close"


},




ko:{


title:"자동매매 시스템",


price:"ETH 가격",


save:"ETH 가격 저장",


history:"가격 기록",


signal:"자동 거래 신호",


trades:"거래 기록",


close:"닫기"


}



};






function changeLanguage(){



let value=document.getElementById("language").value;


let t=lang[value];



document.getElementById("title").innerHTML=t.title;


document.getElementById("price").innerHTML=t.price;


document.getElementById("save").innerHTML=t.save;


document.getElementById("history").innerHTML=t.history;


document.getElementById("signal").innerHTML=t.signal;


document.getElementById("trades").innerHTML=t.trades;


document.getElementById("close").innerHTML=t.close;



}






function popup(url){



window.open(

url,

"popup",

"width=750,height=550,left=400,top=200"

);



}



</script>



</head>



<body>



<div class="container">





<div class="language">


Language :



<select id="language"

onchange="changeLanguage()">



<option value="en" selected>

English

</option>


<option value="ko">

한국어

</option>



</select>


</div>







<h1 id="title">

Automatic Trading System

</h1>









<div class="card">





<div class="btn"

id="price"

onclick="popup('/price')">


ETH Price


</div>





<div class="btn"

id="save"

onclick="popup('/save-price')">


Save ETH Price


</div>






<div class="btn"

id="history"

onclick="popup('/history')">


Price History


</div>






<div class="btn"

id="signal"

onclick="popup('/trade-check')">


Auto Trading Signal


</div>






<div class="btn"

id="trades"

onclick="popup('/trades')">


Trading Records


</div>







<div class="btn close"

id="close"

onclick="window.close()">


Close


</div>





</div>





</div>



</body>


</html>
