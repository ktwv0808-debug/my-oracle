<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Automatic Trading System</title>


<style>


body{

background:#f4f7fb;

font-family:Arial;

text-align:center;

}



.box{

width:750px;

margin:40px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}



select{

padding:8px;

cursor:pointer;

}



.btn{


width:350px;


margin:15px auto;


padding:15px;


background:#0066cc;


color:white;


border-radius:15px;


cursor:pointer;


font-size:18px;


}



.btn:hover{

background:#003b80;

}



.close{

background:#333;

}



</style>



<script>



const text = {



en:{


title:"Automatic Trading System",

price:"ETH Price",

save:"Save ETH Price",

history:"Price History",

signal:"Auto Trading Signal",

trades:"Trading Records",

close:"Close"


},




ko:{


title:"자동매매 시스템",

price:"ETH 가격",

save:"ETH 가격 저장",

history:"가격 기록",

signal:"자동 거래 신호",

trades:"거래 기록",

close:"닫기"


}


};






function changeLanguage(){



let lang = document.getElementById("language").value;



document.getElementById("title").innerText =
text[lang].title;



document.getElementById("priceBtn").innerText =
text[lang].price;



document.getElementById("saveBtn").innerText =
text[lang].save;



document.getElementById("historyBtn").innerText =
text[lang].history;



document.getElementById("signalBtn").innerText =
text[lang].signal;



document.getElementById("tradesBtn").innerText =
text[lang].trades;



document.getElementById("closeBtn").innerText =
text[lang].close;



}






function popup(url){



window.open(

url,

"popup",

"width=750,height=600"

);



}




</script>



</head>


<body>



<div class="box">





<div style="text-align:right">


Language :



<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>


<option value="ko">

한국어

</option>



</select>



</div>





<h1 id="title">

Automatic Trading System

</h1>







<div class="btn"

id="priceBtn"

onclick="popup('/price')">


ETH Price

</div>






<div class="btn"

id="saveBtn"

onclick="popup('/save-price')">


Save ETH Price

</div>







<div class="btn"

id="historyBtn"

onclick="popup('/history')">


Price History

</div>







<div class="btn"

id="signalBtn"

onclick="popup('/trade-check')">


Auto Trading Signal

</div>







<div class="btn"

id="tradesBtn"

onclick="popup('/trades')">


Trading Records

</div>







<div class="btn close"

id="closeBtn"

onclick="window.close()">


Close

</div>





</div>



</body>


</html>
