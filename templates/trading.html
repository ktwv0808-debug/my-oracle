<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>


body{

font-family:"Segoe UI",Arial,sans-serif;

background:#f4f6f8;

padding:40px;

}



.box{


width:650px;

margin:auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 5px 25px rgba(0,0,0,0.15);


}



h1{

text-align:center;

color:#222;

}




.language{


text-align:right;

margin-bottom:20px;


}



select{


padding:8px;

border-radius:8px;

cursor:pointer;


}




.item{


background:#0066cc;

color:white;

padding:16px;

margin:15px;

border-radius:12px;

text-align:center;

cursor:pointer;

font-size:18px;


}




.item:hover{


background:#003f88;


}





.close{


display:block;

margin:30px auto;

padding:12px 35px;

border:none;

background:#555;

color:white;

border-radius:10px;

cursor:pointer;


}


.close:hover{

background:#222;

}



</style>




<script>


function openPopup(url){


window.open(

url,

"popup",

"width=750,height=550,scrollbars=yes"

);


}






function changeLang(){


let lang=document.getElementById("lang").value;



if(lang=="ko"){


document.getElementById("title").innerHTML=
"자동매매 시스템";


document.getElementById("eth").innerHTML=
"ETH 가격";


document.getElementById("save").innerHTML=
"ETH 가격 저장";


document.getElementById("history").innerHTML=
"가격 기록";


document.getElementById("signal").innerHTML=
"자동매매 신호";


document.getElementById("records").innerHTML=
"거래 기록";


}

else{


document.getElementById("title").innerHTML=
"Automatic Trading System";


document.getElementById("eth").innerHTML=
"ETH Price";


document.getElementById("save").innerHTML=
"Save ETH Price";


document.getElementById("history").innerHTML=
"Price History";


document.getElementById("signal").innerHTML=
"Auto Trading Signal";


document.getElementById("records").innerHTML=
"Trading Records";


}



}



</script>


</head>



<body>



<div class="box">


<div class="language">


Language :

<select id="lang" onchange="changeLang()">


<option value="en">

English

</option>



<option value="ko">

한국어

</option>


</select>


</div>




<h1 id="title">

Automatic Trading System

</h1>





<div class="item"

onclick="openPopup('/price-page')"

id="eth">

ETH Price

</div>





<div class="item"

onclick="openPopup('/save-price-page')"

id="save">

Save ETH Price

</div>





<div class="item"

onclick="openPopup('/history-page')"

id="history">

Price History

</div>





<div class="item"

onclick="openPopup('/trade-check-page')"

id="signal">

Auto Trading Signal

</div>





<div class="item"

onclick="openPopup('/trades-page')"

id="records">

Trading Records

</div>







<button class="close"

onclick="window.close()">

Close

</button>



</div>


</body>


</html>
