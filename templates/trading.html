<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<script src="/static/language.js"></script>


<style>

body{

font-family:Arial;

background:#f5f5f5;

text-align:center;

}



.box{

width:700px;

margin:50px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}



button{

display:block;

width:350px;

margin:15px auto;

padding:15px;

font-size:18px;

background:#0066cc;

color:white;

border:none;

border-radius:15px;

cursor:pointer;

}



button:hover{

background:#003b80;

}



.close{

background:#333;

}



select{

padding:8px;

cursor:pointer;

}


</style>



<script>


function popup(url){

window.open(
url,
"_blank",
"width=700,height=600,resizable=yes"
);

}

function closeTrading(){


window.close();


}



</script>


</head>



<body>


<div class="box">



<div align="right">


Language :


<select id="language"

onchange="changeLanguage()">



<option value="en">

English

</option>



<option value="ko">

한국어

</option>



</select>


</div>





<h1

data-en="Automatic Trading System"

data-ko="자동매매 시스템">

Automatic Trading System

</h1>



<button

data-en="ETH Price"

data-ko="ETH 가격"

onclick="popup('/price')">

ETH Price

</button>



<button

data-en="Save ETH Price"

data-ko="ETH 가격 저장"

onclick="popup('/save-price')">

Save ETH Price

</button>



<button

data-en="Price History"

data-ko="가격 기록"

onclick="popup('/history')">

Price History

</button>



<button

data-en="Auto Trading Signal"

data-ko="자동 거래 신호"

onclick="popup('/trade-check')">

Auto Trading Signal

</button>



<button

data-en="Trading Records"

data-ko="거래 기록"

onclick="popup('/trades')">

Trading Records

</button>

<button
data-en="Portfolio"
data-ko="포트폴리오"
onclick="popup('/portfolio')">
💰 Portfolio
</button>

<button

data-en="Close"

data-ko="닫기"

onclick="window.close()">

Close

</button>





</div>



</body>

</html>
