<meta charset="UTF-8">

<title id="pageTitle">
Automatic Trading System
</title>


<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
}


.box{

width:700px;
margin:50px auto;
background:white;
padding:40px;
border-radius:20px;

}


button{

display:block;

width:350px;

margin:15px auto;

padding:15px;

font-size:18px;

background:#0066cc;

color:white;

border:none;

border-radius:15px;

cursor:pointer;

}


.close{

background:#333;

}


</style>



<script>


const text={


en:{


title:"Automatic Trading System",

price:"ETH Price",

save:"Save ETH Price",

history:"Price History",

signal:"Auto Trading Signal",

trades:"Trading Records",

close:"Close"

},



ko:{


title:"자동매매 시스템",

price:"ETH 가격",

save:"ETH 가격 저장",

history:"가격 기록",

signal:"자동 거래 신호",

trades:"거래 기록",

close:"닫기"

}


};





function langChange(){


let l=document.getElementById("language").value;


document.getElementById("pageTitle").innerText=text[l].title;


document.getElementById("title").innerText=text[l].title;


document.getElementById("price").innerText=text[l].price;


document.getElementById("save").innerText=text[l].save;


document.getElementById("history").innerText=text[l].history;


document.getElementById("signal").innerText=text[l].signal;


document.getElementById("trades").innerText=text[l].trades;


document.getElementById("close").innerText=text[l].close;


}




function popup(url){


window.open(

url,

"_blank",

"width=700,height=600"

);


}



</script>


</head>



<body>


<div class="box">


<div align="right">


Language :


<select id="language"

onchange="langChange()">



<option value="en">

English

</option>


<option value="ko">

한국어

</option>


</select>


</div>




<h1 id="title">

Automatic Trading System

</h1>




<button id="price"

onclick="popup('/price')">

ETH Price

</button>




<button id="save"

onclick="popup('/save-price')">

Save ETH Price

</button>




<button id="history"

onclick="popup('/history')">

Price History

</button>




<button id="signal"

onclick="popup('/trade-check')">

Auto Trading Signal

</button>




<button id="trades"

onclick="popup('/trades')">

Trading Records

</button>




<button id="close"

class="close"

onclick="window.close()">

Close

</button>




</div>


</body>

</html>
