<!DOCTYPE html>
<html lang="ko">

<head>
<script src="/static/language.js"></script>
<meta charset="UTF-8">

<title>
Automatic Trading System
</title>


<style>

body{

font-family:Arial;

background:#f5f5f5;

text-align:center;

}


.box{

width:700px;

margin:50px auto;

background:white;

padding:40px;

border-radius:20px;

box-shadow:0 0 20px #aaa;

}



button{

width:350px;

padding:15px;

margin:15px;

font-size:18px;

border:none;

border-radius:15px;

background:#0066cc;

color:white;

cursor:pointer;

}



.close{

background:#333;

}


</style>



<script>


let current="en";



let lang={


en:{


title:"Automatic Trading System",

price:"ETH Price",

save:"Save ETH Price",

history:"Price History",

signal:"Auto Trading Signal",

trades:"Trading Records",

close:"Close"


},



ko:{


title:"자동매매 시스템",

price:"ETH 가격",

save:"ETH 가격 저장",

history:"가격 기록",

signal:"자동 거래 신호",

trades:"거래 기록",

close:"닫기"


}


};






function translate(){


let l=document.getElementById("language").value;



document.getElementById("title").innerHTML =
lang[l].title;



document.getElementById("price").innerHTML =
lang[l].price;



document.getElementById("save").innerHTML =
lang[l].save;



document.getElementById("history").innerHTML =
lang[l].history;



document.getElementById("signal").innerHTML =
lang[l].signal;



document.getElementById("trades").innerHTML =
lang[l].trades;



document.getElementById("close").innerHTML =
lang[l].close;



}







function popup(url){


window.open(

url,

"child",

"width=700,height=600"

);


}





</script>


</head>



<body>


<div class="box">



<div style="text-align:right">


Language :


<select id="language"

onchange="translate()">



<option value="en">

English

</option>



<option value="ko">

한국어

</option>



</select>


</div>





<h1 id="title">

Automatic Trading System

</h1>




<button id="price"

onclick="popup('/price')">

ETH Price

</button>




<button id="save"

onclick="popup('/save-price')">

Save ETH Price

</button>




<button id="history"

onclick="popup('/history')">

Price History

</button>




<button id="signal"

onclick="popup('/trade-check')">

Auto Trading Signal

</button>




<button id="trades"

onclick="popup('/trades')">

Trading Records

</button>




<button data-lang="save"
onclick="popup('/save-price')">

Save ETH Price

</button>



</div>


</body>


</html>
