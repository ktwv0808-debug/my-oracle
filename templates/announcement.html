<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Announcements</title>

<style>

body{

    background:#111;

    color:white;

    font-family:Arial;

    margin:0;

}

.container{

    width:90%;

    margin:auto;

    margin-top:40px;

}

h2{

    text-align:center;

    margin-bottom:30px;

}

table{

    width:100%;

    border-collapse:collapse;

    background:#222;

}

th{

    background:#333;

    padding:15px;

    border:1px solid #444;

}

td{

    padding:12px;

    border:1px solid #444;

}

tr:hover{

    background:#2c2c2c;

}

a{

    color:#00d4ff;

    text-decoration:none;

}

a:hover{

    color:yellow;

}

.empty{

    text-align:center;

    padding:40px;

    color:#888;

}

.back{

    margin-top:20px;

    display:inline-block;

    color:cyan;

}

</style>

</head>

<body>

<div class="container">

<h2>📢 World Vision Announcements</h2>

<table>

<tr>

<th width="80">No</th>

<th>Title</th>

<th width="220">Created</th>

</tr>

{% if rows %}

{% for row in rows %}

<tr>

<td align="center">

{{ row.id }}

</td>

<td>

<a href="/announcement/{{ row.id }}">

{{ row.title }}

</a>

</td>

<td align="center">

{{ row.created_at }}

</td>

</tr>

{% endfor %}

{% else %}

<tr>

<td colspan="3" class="empty">

No announcements available.

</td>

</tr>

{% endif %}

</table>

<br>

<a class="back" href="/">

← Back Home

</a>

</div>

</body>

</html>
