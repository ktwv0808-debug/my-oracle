<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Announcement</title>

<style>

body{

    margin:0;

    background:#f5f7fa;

    font-family:Arial, sans-serif;

}

/* ------------------------------------------------------
Container
------------------------------------------------------ */

.container{

    width:900px;

    margin:50px auto;

    background:white;

    padding:40px;

    border-radius:20px;

    box-shadow:0 0 20px rgba(0,0,0,.2);

    position:relative;

}

/* ------------------------------------------------------
Close Button
------------------------------------------------------ */

.close-btn{

    position:absolute;

    top:20px;

    right:20px;

    background:#d9534f;

    color:white;

    padding:10px 18px;

    border-radius:10px;

    text-decoration:none;

    font-size:16px;

    font-weight:bold;

}

.close-btn:hover{

    background:#b52b27;

}

/* ------------------------------------------------------
Title
------------------------------------------------------ */

h1{

    text-align:center;

    color:#0066cc;

    margin-bottom:40px;

}

/* ------------------------------------------------------
Table
------------------------------------------------------ */

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:#0066cc;

    color:white;

    padding:12px;

}

td{

    border:1px solid #ddd;

    padding:12px;

}

tr:nth-child(even){

    background:#f8f8f8;

}

a{

    color:#0066cc;

    text-decoration:none;

    font-weight:bold;

}

a:hover{

    text-decoration:underline;

}

</style>

</head>

<body>

<!-- ======================================================
Close
====================================================== -->

<a
href="#"
class="close-btn"
onclick="window.open('','_self');window.close();return false;">

✖ Close

</a>

<div class="container">

<h1>

Announcement

</h1>

<table>

<tr>

<th width="10%">

No

</th>

<th>

Title

</th>

<th width="25%">

Date

</th>

</tr>

{% for row in rows %}

<tr>

<td>

{{ row.id }}

</td>

<td>

<a href="/announcement/{{ row.id }}">

{{ row.title }}

</a>

</td>

<td>

{{ row.created_at }}

</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
