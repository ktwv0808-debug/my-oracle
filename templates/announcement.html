<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>Announcement</title>

<style>

body{

    font-family:Arial;

    background:#f5f5f5;

    margin:30px;

}

.container{

    width:900px;

    margin:auto;

}

.card{

    background:white;

    padding:15px;

    margin-bottom:15px;

    border-radius:8px;

    box-shadow:0 2px 6px rgba(0,0,0,.15);

}

a{

    text-decoration:none;

    color:#0066cc;

    font-size:18px;

    font-weight:bold;

}

.date{

    color:#888;

    font-size:13px;

    margin-top:5px;

}

</style>

</head>

<body>

<div class="container">

<h1>Announcement</h1>

{% for row in rows %}

<div class="card">

<a href="/announcement/{{ row.id }}">

{{ row.title }}

</a>

<div class="date">

{{ row.created_at }}

</div>

</div>

{% endfor %}

</div>

</body>

</html>
